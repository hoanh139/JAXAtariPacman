# PQN Pacman Pixel-Based - FINAL (100M steps, 1 epoch)
ALG_NAME: "pqn"
TOTAL_TIMESTEPS: 1e8
TOTAL_TIMESTEPS_DECAY: 1e8
NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.0
EPS_FINISH: 0.001
EPS_DECAY: 0.1
NUM_EPOCHS: 1
NUM_MINIBATCHES: 32
NORM_TYPE: "layer_norm"
LR: 2.5e-4
MAX_GRAD_NORM: 10
LR_LINEAR_DECAY: False
GAMMA: 0.99
LAMBDA: 0.65

# env specific
ENV_NAME: "Pacman"
ENV_KWARGS: {}
OBJECT_CENTRIC: False
# No mod during final training run
MOD_NAME: null

# Testing during training
TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 128
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0
RECORD_VIDEO: True

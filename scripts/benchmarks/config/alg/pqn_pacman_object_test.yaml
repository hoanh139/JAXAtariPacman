# PQN Pacman Object-Centric - TEST (20M steps, 3 epochs)
ALG_NAME: "pqn"
TOTAL_TIMESTEPS: 2e7
TOTAL_TIMESTEPS_DECAY: 2e7
NUM_ENVS: 1024
NUM_STEPS: 128
EPS_START: 1.0
EPS_FINISH: 0.001
EPS_DECAY: 0.1
NUM_EPOCHS: 3
NUM_MINIBATCHES: 128
NORM_TYPE: "layer_norm"
LR: 1.0e-4
MAX_GRAD_NORM: 10
LR_LINEAR_DECAY: False
GAMMA: 0.99
LAMBDA: 0.65

# env specific
ENV_NAME: "Pacman"
ENV_KWARGS: {}
OBJECT_CENTRIC: True
# Use mod during test run for debugging
MOD_NAME: slower_ghosts

# Testing during training - enabled for test runs
TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.1
TEST_NUM_ENVS: 1024
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0
RECORD_VIDEO: True
